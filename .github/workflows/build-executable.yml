name: Build executable

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64
            os: macos-13
            build-command: npm run dist -- --mac dmg --x64 --publish never
            artifact-name: MyAvToolbox-macOS-x64
            artifact-path: |
              dist/*x64.dmg
          - name: macOS arm64
            os: macos-14
            build-command: npm run dist -- --mac dmg --arm64 --publish never
            artifact-name: MyAvToolbox-macOS-arm64
            artifact-path: |
              dist/*arm64.dmg
          - name: Windows
            os: windows-latest
            build-command: npm run dist -- --win nsis --x64 --publish never
            artifact-name: MyAvToolbox-Windows
            artifact-path: |
              dist/*.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build executable
        run: ${{ matrix.build-command }}

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download executables
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: MyAvToolbox build ${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }} on main.

            macOS builds are not notarized. If macOS blocks the app after download, run:
            xattr -dr com.apple.quarantine /Applications/MyAvToolbox.app
          files: release-assets/**/*
